<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two-Player Trivia Battle Game</title>

    <link rel="stylesheet" href="./css/index.css">

</head>

<body id=indexPage>
    <p>Two-Player Trivia Battle Game</p>
    <h1 id="pageName">Players Details</h1>
    <div class="payerNames">
        <label for="player1">Player 1 :<span class="required">*</span> </label>
        <input type="text" id="player1" name="player1" placeholder="Eg: Ram " required>
        <label for="player2">Player 2 :<span class="required">*</span> </label>
        <input type="text" id="player2" name="player2" placeholder="Eg: Shyam" required>
    </div>
    <button id="startBtn">Start Game</button>

    <script src="./js/index.js"></script>
</body>

</html>
